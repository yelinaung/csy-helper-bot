stages:
- security
- test
- validate
- deploy
- observability

variables:
  SECRET_DETECTION_ENABLED: 'true'
  ALPINE_JQ_IMAGE: apteno/alpine-jq:latest@sha256:2618c251ddb92dd09e9bee03769792df70a31083a8d4105472ef5c823b2fb8e3
  # renovate: datasource=github-releases depName=equinix-labs/otel-cli
  OTEL_CLI_VERSION: 0.4.5

include:
- template: Security/Secret-Detection.gitlab-ci.yml
- template: Security/SAST.gitlab-ci.yml

secret_detection:
  stage: security
  tags:
  - playground-bravo

check_secrets:
  stage: validate
  image: $ALPINE_JQ_IMAGE
  tags:
  - playground-bravo
  needs:
  - job: secret_detection
    artifacts: true
  script:
  - |
    if [ ! -f "gl-secret-detection-report.json" ]; then
      echo "Secret detection report not found!"
      exit 1
    fi

    if [ "$(jq '.vulnerabilities | length' gl-secret-detection-report.json)" -gt 0 ]; then
      echo "Secrets detected in the codebase!"
      jq -r '.vulnerabilities[] | "- \(.message) in \(.location.file):\(.location.start_line)"' \
        gl-secret-detection-report.json
      exit 1
    else
      echo "No secrets detected"
    fi

lint:
  stage: validate
  image: golangci/golangci-lint:v2.12-alpine@sha256:91b27804074a0bacea298707f016911e60cf0cdbc6c7bf5ccacb5f0606d18d60
  tags:
  - playground-bravo
  cache:
    key: go-lint-cache
    paths:
    - .cache/golangci-lint
  script:
  - golangci-lint run --timeout=5m ./...


test:
  stage: validate
  image: golang:1.26-alpine@sha256:3ad57304ad93bbec8548a0437ad9e06a455660655d9af011d58b993f6f615648
  tags:
  - playground-bravo
  needs:
  - job: check_secrets
  cache:
    key: go-mod-cache
    paths:
    - .cache/go-build
    - .cache/go-mod
    - .hegel
  before_script:
  - export GOCACHE="$(pwd)/.cache/go-build"
  - export GOMODCACHE="$(pwd)/.cache/go-mod"
  # Hegel's native library requires glibc; the Alpine-based image uses musl.
  # gcompat provides ld-linux-x86-64.so.2 and other glibc stubs; libgcc
  # provides libgcc_s.so.1, which libhegel-linux-amd64.so links against.
  - apk add --no-cache gcompat libgcc
  script:
  - go test -v ./...
  - |
    for target in \
      FuzzUTF16EntityRangeToByteRange \
      FuzzMentionAndSuffixAtEntity \
      FuzzShouldHandleAskMention \
      FuzzSanitizeForPrompt \
      FuzzExplainPromptConstruction; do
      go test -run=^$ -fuzz="$target" -fuzztime=20s ./internal/bot
    done

semgrep-sast:
  stage: security
  tags:
  - playground-bravo

check_sast:
  stage: validate
  image: $ALPINE_JQ_IMAGE
  tags:
  - playground-bravo
  needs:
  - job: semgrep-sast
    artifacts: true
  script:
  - |
    if [ ! -f "gl-sast-report.json" ]; then
      echo "SAST report not found!"
      exit 1
    fi

    VULN_COUNT=$(jq '.vulnerabilities | length' gl-sast-report.json)
    if [ "$VULN_COUNT" -gt 0 ]; then
      echo "SAST vulnerabilities detected!"
      jq -r '.vulnerabilities[] | "- [\(.severity)] \(.name) in \(.location.file):\(.location.start_line)"' \
        gl-sast-report.json
      exit 1
    else
      echo "No SAST vulnerabilities detected"
    fi
  rules:
  - if: $CI_COMMIT_BRANCH == "master"
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"

deploy:
  stage: deploy
  image: alpine:latest@sha256:28bd5fe8b56d1bd048e5babf5b10710ebe0bae67db86916198a6eec434943f8b
  tags:
  - playground-bravo
  variables:
    GIT_DEPTH: 0
    GIT_STRATEGY: clone
  needs:
  - job: test
  - job: check_sast
  - job: lint
  before_script:
  - apk add --no-cache git openssh-client
  - eval $(ssh-agent -s)
  - echo "$DOKKU_SSH_PRIVATE_KEY_B64" | base64 -d | tr -d '\r' | ssh-add -
  - mkdir -p ~/.ssh
  - chmod 700 ~/.ssh
  - echo "$DOKKU_HOST_KEY" >> ~/.ssh/known_hosts
  script:
  - git remote add dokku dokku@$DOKKU_HOST:csy-helper-bot || true
  - git remote -v
  - git push dokku HEAD:main --force
  rules:
  - if: $CI_COMMIT_BRANCH == "master"

# === OBSERVABILITY STAGE ===
# Export the whole pipeline as an OpenTelemetry trace to ClickStack.
# Mirrors the GitHub Actions otel-cicd-action job: one root span for the
# pipeline plus a child span per job, built from the GitLab API and shipped
# with otel-cli. Runs last and never fails the pipeline.
export_trace:
  stage: observability
  image: $ALPINE_JQ_IMAGE
  tags:
    - playground-bravo
  when: always
  allow_failure: true
  variables:
    # otel-cli reads these; OTEL_EXPORTER_OTLP_ENDPOINT (base URL) and
    # OTEL_EXPORTER_HEADERS are configured as CI/CD variables in GitLab.
    OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
    OTEL_EXPORTER_OTLP_HEADERS: $OTEL_EXPORTER_HEADERS
  rules:
    # Skip entirely if the endpoint isn't configured.
    - if: $OTEL_EXPORTER_OTLP_ENDPOINT == null
      when: never
    - when: always
  script:
    - |
      set -eu
      apk add --no-cache curl >/dev/null

      # --- install otel-cli (pinned + checksum-verified) ---
      echo "Installing otel-cli v${OTEL_CLI_VERSION}..."
      BASE="https://github.com/equinix-labs/otel-cli/releases/download/v${OTEL_CLI_VERSION}"
      TARBALL="otel-cli_${OTEL_CLI_VERSION}_linux_amd64.tar.gz"
      curl -sSfL -o "${TARBALL}" "${BASE}/${TARBALL}"
      curl -sSfL -o checksums.txt "${BASE}/checksums.txt"
      grep " ${TARBALL}\$" checksums.txt | sha256sum -c -
      tar -xzf "${TARBALL}" -C /usr/local/bin otel-cli

      # otel-cli defaults to gRPC; force HTTP and surface export failures.
      # --fail makes a failed export return non-zero; --verbose logs to stderr.
      OTEL_ARGS="--protocol http/protobuf --endpoint ${OTEL_EXPORTER_OTLP_ENDPOINT} --fail --verbose"
      echo "Endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT} (otel-cli appends /v1/traces)"

      # The runner resolves via LAN DNS and can't resolve the Tailscale
      # MagicDNS name. Map the hostname to a reachable IP (set the
      # OTEL_ENDPOINT_HOST_IP CI/CD variable to the Tailscale/LAN IP of the
      # collector host) so we still connect by name and the TLS cert matches.
      OTEL_HOST=${OTEL_EXPORTER_OTLP_ENDPOINT#*://}
      OTEL_HOST=${OTEL_HOST%%/*}
      OTEL_HOST=${OTEL_HOST%%:*}
      if [ -n "${OTEL_ENDPOINT_HOST_IP:-}" ]; then
        echo "${OTEL_ENDPOINT_HOST_IP} ${OTEL_HOST}" >> /etc/hosts
        echo "Mapped ${OTEL_HOST} -> ${OTEL_ENDPOINT_HOST_IP} via /etc/hosts"
      else
        echo "WARNING: OTEL_ENDPOINT_HOST_IP not set; relying on DNS for ${OTEL_HOST}"
      fi

      # --- fetch this pipeline's jobs from the GitLab API ---
      # CI_JOB_TOKEN may lack access to the jobs API; set GITLAB_API_TOKEN
      # (read_api) as a CI/CD variable if so.
      if [ -n "${GITLAB_API_TOKEN:-}" ]; then
        AUTH_HEADER="PRIVATE-TOKEN: ${GITLAB_API_TOKEN}"
      else
        AUTH_HEADER="JOB-TOKEN: ${CI_JOB_TOKEN}"
      fi
      curl -sSf --header "${AUTH_HEADER}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/pipelines/${CI_PIPELINE_ID}/jobs?per_page=100" \
        > jobs.json
      echo "Jobs fetched: $(jq 'length' jobs.json), completed: $(jq '[.[]|select(.finished_at!=null)]|length' jobs.json)"

      # --- pipeline span boundaries from job timestamps ---
      PIPELINE_START=$(jq -r '[.[].started_at  | select(. != null)] | min // empty' jobs.json)
      PIPELINE_END=$(jq   -r '[.[].finished_at | select(. != null)] | max // empty' jobs.json)
      : "${PIPELINE_START:?no started jobs found - nothing to export}"
      : "${PIPELINE_END:=$PIPELINE_START}"
      echo "Pipeline window: ${PIPELINE_START} -> ${PIPELINE_END}"

      # --- generate our own trace/span ids so children link to the root
      # deterministically (W3C: 16-byte trace id, 8-byte span id, as hex). ---
      TRACE_ID=$(head -c 16 /dev/urandom | od -An -tx1 | tr -d ' \n')
      ROOT_SPAN_ID=$(head -c 8 /dev/urandom | od -An -tx1 | tr -d ' \n')
      echo "Trace ID: ${TRACE_ID}"

      # --- root span for the pipeline ---
      otel-cli span ${OTEL_ARGS} \
        --service gitlab-ci \
        --name "pipeline #${CI_PIPELINE_ID} (${CI_COMMIT_REF_NAME})" \
        --start "${PIPELINE_START}" --end "${PIPELINE_END}" \
        --attrs "ci.pipeline.id=${CI_PIPELINE_ID},ci.project.path=${CI_PROJECT_PATH},ci.commit.ref=${CI_COMMIT_REF_NAME},ci.commit.sha=${CI_COMMIT_SHA}" \
        --force-trace-id "${TRACE_ID}" --force-span-id "${ROOT_SPAN_ID}"
      echo "Root span sent."

      # --- one child span per completed job, parented to the root ---
      jq -r '.[] | select(.started_at != null and .finished_at != null)
              | [.name, .status, .stage, .started_at, .finished_at, (.id|tostring)] | @tsv' jobs.json |
      while IFS="$(printf '\t')" read -r name status stage started finished id; do
        echo "  span: ${name} [${status}] ${started} -> ${finished}"
        otel-cli span ${OTEL_ARGS} \
          --service gitlab-ci \
          --name "${name}" \
          --start "${started}" --end "${finished}" \
          --attrs "ci.job.id=${id},ci.job.status=${status},ci.job.stage=${stage}" \
          --force-trace-id "${TRACE_ID}" --force-parent-span-id "${ROOT_SPAN_ID}"
      done
      echo "Trace export complete."
