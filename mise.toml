[tools]
go = "1.26"
golangci-lint = "2.11.3"
gofumpt = "0.7.0"

[tasks.test]
description = "Run Go tests"
run = [
  "mkdir -p .cache/go-build .cache/go-mod",
  "GOCACHE=$PWD/.cache/go-build GOMODCACHE=$PWD/.cache/go-mod go test -v -coverprofile=coverage.out ./...",
  "go tool cover -func=coverage.out",
]

[tasks.lint]
description = "Run golangci-lint with project config"
run = [
  "mkdir -p .cache/go-build .cache/go-mod",
  "GOCACHE=$PWD/.cache/go-build GOMODCACHE=$PWD/.cache/go-mod golangci-lint run --config .golangci.yml ./...",
]

[tasks.format]
description = "Format Go code"
alias = "fmt"
run = ["find . -name '*.go' -not -path './.cache/*' | xargs gofumpt -w"]

[tasks.push-all]
description = "Pull with rebase from github, then push current branch to all remotes"
run = [
  "test -n \"$(git branch --show-current)\"",
  "git pull --rebase --autostash github \"$(git branch --show-current)\"",
  "git push github \"$(git branch --show-current)\"",
  "git push gitlab \"$(git branch --show-current)\"",
]

[tasks.run]
description = "Run the bot with automatic SOPS decryption"
run = [
  "mkdir -p .cache/go-build .cache/go-mod",
  "sops exec-env .env 'GOCACHE=$PWD/.cache/go-build GOMODCACHE=$PWD/.cache/go-mod go run ./cmd/csy-helper-bot'",
]

[tasks.build]
description = "Build the bot binary"
run = [
  "mkdir -p .cache/go-build .cache/go-mod",
  "GOCACHE=$PWD/.cache/go-build GOMODCACHE=$PWD/.cache/go-mod go build -o csy-helper-bot ./cmd/csy-helper-bot",
]

[tasks.decrypt]
description = "Decrypt .env file to stdout"
run = ["sops --decrypt .env"]

[tasks.edit-env]
description = "Edit encrypted .env file (auto-encrypts on save)"
run = ["sops .env"]
