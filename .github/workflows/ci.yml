---
name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  GO_VERSION: '1.26'

permissions:
  contents: read

jobs:
  # Secret Detection
  secret-detection:
    name: Secret Detection
    runs-on: [self-hosted, Linux, X64, playground-ubuntu]
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false

  # SAST Scanning
  semgrep-sast:
    name: SAST Scan
    runs-on: [self-hosted, Linux, X64, playground-ubuntu]
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Semgrep
        run: |
          if ! command -v semgrep &>/dev/null; then
            python -m pip install --require-hashes -r .github/requirements/semgrep.txt
          fi

      - name: Run Semgrep
        run: semgrep scan --config auto --error --exclude-rule=generic.secrets.security.detected-sonarqube-docs-api-key.detected-sonarqube-docs-api-key .

  # Lint
  lint:
    name: Lint
    runs-on: [self-hosted, Linux, X64, playground-ubuntu]
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2
        env:
          GOTOOLCHAIN: auto

  # Test
  test:
    name: Test
    runs-on: [self-hosted, Linux, X64, playground-ubuntu]
    permissions:
      contents: read
    needs:
      - secret-detection
      - semgrep-sast
      - lint
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Run tests
        run: go test -v -coverprofile=coverage.out ./...

      - name: Run fuzz tests
        run: |
          for target in \
            FuzzUTF16EntityRangeToByteRange \
            FuzzMentionAndSuffixAtEntity \
            FuzzShouldHandleAskMention \
            FuzzSanitizeForPrompt \
            FuzzExplainPromptConstruction; do
            go test -run=^$ -fuzz="$target" -fuzztime=20s ./internal/bot
          done

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          THRESHOLD=40
          echo "Coverage: ${COVERAGE}% (threshold: ${THRESHOLD}%)"
          if [ "$(awk "BEGIN {print ($COVERAGE < $THRESHOLD)}")" = "1" ]; then
            echo "Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%!"
            exit 1
          fi
          echo "Coverage check passed!"

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  otel-cicd-action:
    if: always()
    name: OpenTelemetry Export Trace
    runs-on: [self-hosted, Linux, X64, playground-ubuntu]
    permissions:
      contents: read
      actions: read
    needs:
      [
        secret-detection,
        semgrep-sast,
        lint,
        test
      ]
    steps:
      - name: Export workflow
        uses: corentinmusard/otel-cicd-action@f2d88ecf54d9dd3e01ea95e25f93603212ee93d3 # v4
        with:
          otlpEndpoint: ${{ vars.OTEL_EXPORTER_OTLP_ENDPOINT }}/v1/traces
          otlpHeaders: ${{ secrets.OTEL_EXPORTER_HEADERS }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
