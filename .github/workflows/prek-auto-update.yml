name: Prek Auto-update

on:
  schedule:
    # Run daily at 09:00 UTC
    - cron: "0 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-update:
    name: Update pre-commit hooks
    runs-on: [self-hosted, Linux, X64, playground-ubuntu]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install prek
        uses: j178/prek-action@bdca6f102f98e2b4c7029491a53dfd366469e33d # v2.0.4
        with:
          install-only: true
          prek-version: "0.4.6"

      - name: Run prek auto-update
        run: prek auto-update --cooldown-days 3

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/prek-auto-update
          title: "chore: auto-update pre-commit hooks"
          body: |
            Automated update of pre-commit hook versions via `prek auto-update`.

            Review the changes to `.pre-commit-config.yaml` and merge if CI passes.
          commit-message: "chore: auto-update pre-commit hooks"
          labels: dependencies
