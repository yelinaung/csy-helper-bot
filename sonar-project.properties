sonar.projectKey=yelinaung_csy-helper-bot
sonar.organization=yelinaung

# Source configuration
sonar.sources=.
sonar.exclusions=**/*_test.go,**/mocks/**,**/testdata/**
sonar.tests=.
sonar.test.inclusions=**/*_test.go
sonar.coverage.exclusions=**/*_test.go,**/mocks/**,internal/testutil/**/*

# Go coverage report (generated by: go test -coverprofile=coverage.out)
sonar.go.coverage.reportPaths=coverage.out

# Test callbacks intentionally keep generators and their related assertions
# together so Hegel and Go fuzzing can shrink failures with useful context.
# Production complexity remains fully analyzed.
sonar.issue.ignore.multicriteria=testComplexity,testParameterCount
sonar.issue.ignore.multicriteria.testComplexity.ruleKey=go:S3776
sonar.issue.ignore.multicriteria.testComplexity.resourceKey=**/*_test.go
sonar.issue.ignore.multicriteria.testParameterCount.ruleKey=go:S107
sonar.issue.ignore.multicriteria.testParameterCount.resourceKey=**/*_test.go
