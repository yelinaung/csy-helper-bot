[tasks.test]
description = "Run Go tests"
run = [
  "mkdir -p .cache/go-build .cache/go-mod",
  "GOCACHE=$PWD/.cache/go-build GOMODCACHE=$PWD/.cache/go-mod go test -v ./...",
]

[tasks.lint]
description = "Run golangci-lint with project config"
run = [
  "mkdir -p .cache/go-build .cache/go-mod",
  "GOCACHE=$PWD/.cache/go-build GOMODCACHE=$PWD/.cache/go-mod golangci-lint run --config .golangci.yml ./...",
]

[tasks.format]
description = "Format Go code"
run = ["gofumpt -w ."]

[tasks.push-all]
description = "Pull with rebase from github, then push current branch to all remotes"
run = [
  "test -n \"$(git branch --show-current)\"",
  "git pull --rebase --autostash github \"$(git branch --show-current)\"",
  "git push github \"$(git branch --show-current)\"",
  "git push gitlab \"$(git branch --show-current)\"",
]
